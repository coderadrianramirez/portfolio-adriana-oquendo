    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; }

    @keyframes scrollLeft {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .scroll-track { animation: scrollLeft 28s linear infinite; }
    .scroll-track:hover { animation-play-state: paused; }

    .anim-fade-up   { animation: fadeInUp 0.9s ease both; }
    .anim-fade-up-1 { animation: fadeInUp 0.9s ease 0.15s both; }
    .anim-fade-up-2 { animation: fadeInUp 0.9s ease 0.30s both; }
    .anim-fade-up-3 { animation: fadeInUp 0.9s ease 0.45s both; }

    .spin-slow { animation: spinSlow 20s linear infinite; }
    .dot-blink { animation: blink 1.8s ease-in-out infinite; }

    .project-card .project-img  { transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94); }
    .project-card:hover .project-img { transform: scale(1.06); }
    .project-card .project-overlay { opacity: 0; transition: opacity 0.35s ease; }
    .project-card:hover .project-overlay { opacity: 1; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }

            <p className={`text-base leading-relaxed mb-12 ${dark ? 'text-white/50' : 'text-black/50'}`}>
              {t('contactSub')}
            </p>
            <div className="flex flex-col gap-5 mb-10">
              {contactItems.map(c => (
                <div key={c.label} className="flex items-center gap-4">
                  <div className={`w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ${dark ? 'bg-white/[0.05] text-white/50' : 'bg-black/[0.04] text-black/50'}`}>
                    <Icon name={c.icon} size={15}/>
                  </div>
                  <div>
                    <div className={`text-xs mb-0.5 ${dark ? 'text-white/30' : 'text-black/30'}`}>{c.label}</div>
                    <div className={`text-sm font-medium ${dark ? 'text-white' : 'text-black'}`}>{c.val}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="flex gap-2.5">
              {socials.map(s => (
                <button key={s.label} className={`w-10 h-10 rounded-xl flex items-center justify-center border transition-all hover:border-violet-500 hover:text-violet-500 ${
                  dark ? 'border-white/10 text-white/50' : 'border-black/10 text-black/50'}`}>
                  <Icon name={s.icon} size={15}/>
                </button>
              ))}
            </div>
          </div>

          {/* Form */}
          <form onSubmit={handleSubmit} className="flex flex-col gap-4">
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label className={`text-xs font-medium mb-2 block ${dark ? 'text-white/45' : 'text-black/45'}`}>{t('fName')}</label>
                <input type="text" placeholder={t('fNamePH')} className={inp} value={form.name} onChange={e => setForm({...form, name:e.target.value})} required/>
              </div>
              <div>
                <label className={`text-xs font-medium mb-2 block ${dark ? 'text-white/45' : 'text-black/45'}`}>{t('fEmail')}</label>
                <input type="email" placeholder={t('fEmailPH')} className={inp} value={form.email} onChange={e => setForm({...form, email:e.target.value})} required/>
              </div>
            </div>
            <div>
              <label className={`text-xs font-medium mb-2 block ${dark ? 'text-white/45' : 'text-black/45'}`}>{t('fMsg')}</label>
              <textarea placeholder={t('fMsgPH')} rows={7} className={`${inp} resize-none`} value={form.message} onChange={e => setForm({...form, message:e.target.value})} required/>
            </div>
            <button type="submit" className={`group flex items-center justify-center gap-3 px-8 py-4 rounded-xl font-semibold text-white transition-all duration-300 ${
              sent ? 'bg-emerald-500' : 'bg-violet-600 hover:bg-violet-500 hover:shadow-xl hover:shadow-violet-500/30 hover:-translate-y-0.5'}`}>
              {sent ? (<><Icon name="check" size={18}/> {t('fSuccess')}</>) : (<>{t('fSubmit')} <Icon name="send" size={18} className="group-hover:translate-x-1 group-hover:-translate-y-0.5 transition-transform"/></>)}
            </button>
          </form>
        </div>
      </div>
    </section>
  );
};

/* ─────────────────────────────────────────
   FOOTER
───────────────────────────────────────── */
const Footer = ({ dark, lang }) => { const t = k => TEXTS[lang][k]; return (
  <footer className={`py-10 px-6 border-t ${dark ? 'border-white/[0.08]' : 'border-black/[0.08]'}`}>
    <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
      <div className={`font-sans text-lg font-semibold ${dark ? 'text-white' : 'text-black'}`}>
        adriana oquendo<span className="text-violet-500">.</span>
      </div>
      <div className={`text-xs ${dark ? 'text-white/30' : 'text-black/30'}`}>
        {t('footerCopy')}
      </div>
      <button onClick={() => window.scrollTo({ top:0, behavior:'smooth' })}
        className={`text-xs font-medium transition-colors hover:text-violet-500 ${dark ? 'text-white/35' : 'text-black/35'}`}>
        {t('footerBack')}
      </button>
    </div>
  </footer>
); };

/* ─────────────────────────────────────────
   ALL PROJECTS PAGE
───────────────────────────────────────── */
const AllProjects = ({ dark, lang, setView }) => {
  const t = k => TEXTS[lang][k];
  const [filter, setFilter] = useState('All');
  const filterDefs = t('filterDefs');
  const shown = filter === 'All' ? ALL_PROJECTS : ALL_PROJECTS.filter(p => p.category === filter);

  return (
    <div className="min-h-screen pt-28 pb-24 px-6">
      <div className="max-w-7xl mx-auto">
        {/* Back */}
        <button onClick={() => setView('home')}
          className={`inline-flex items-center gap-2 text-sm font-medium mb-10 transition-all hover:text-violet-500 hover:-translate-x-0.5 ${dark ? 'text-white/50' : 'text-black/50'}`}>
          <Icon name="arrowLeft" size={15}/> {t('allBack')}
        </button>

        {/* Header */}
        <div className="flex flex-col md:flex-row md:items-end justify-between gap-8 mb-16">
          <div>
            <span className={`text-xs font-bold tracking-[0.22em] uppercase mb-5 block ${dark ? 'text-violet-400' : 'text-violet-600'}`}>{t('allLabel')}</span>
            <h1 className={`font-display font-bold tracking-tight leading-none ${dark ? 'text-white' : 'text-black'}`} style={{ fontSize:'clamp(2.8rem,7vw,6rem)' }}>
              {t('allH2')[0]}<br/><span className="text-violet-500">{t('allH2')[1]}</span>
            </h1>
          </div>
          <p className={`text-base max-w-sm leading-relaxed ${dark ? 'text-white/45' : 'text-black/45'}`}>
            {t('allSub')(ALL_PROJECTS.length)}
          </p>
        </div>

        {/* Filters */}
        <div className="flex items-center gap-3 mb-12 flex-wrap">
          <span className={`text-xs font-medium ${dark ? 'text-white/30' : 'text-black/30'}`}>{t('allFilterBy')}</span>
          {filterDefs.map(f => (
            <button key={f.v} onClick={() => setFilter(f.v)}
              className={`px-5 py-2 rounded-full text-sm font-semibold border transition-all duration-200 ${
                filter === f.v
                  ? 'bg-violet-600 text-white border-violet-600 shadow-lg shadow-violet-500/25'
                  : dark
                    ? 'border-white/10 text-white/50 hover:border-violet-500/40 hover:text-violet-400'
                    : 'border-black/10 text-black/50 hover:border-violet-500/40 hover:text-violet-600'}`}>
              {f.l}
              {filter === f.v && <span className="ml-2 text-xs opacity-70">{shown.length}</span>}
            </button>
          ))}
        </div>

        {/* Grid */}
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          {shown.map(p => <ProjectCard key={p.id} p={p} dark={dark} lang={lang}/>)}
        </div>

        {shown.length === 0 && (
          <div className={`text-center py-24 text-sm ${dark ? 'text-white/25' : 'text-black/25'}`}>
            {t('allEmpty')}
          </div>
        )}
      </div>
    </div>
  );
};

/* ─────────────────────────────────────────
   HOME
───────────────────────────────────────── */
const Home = ({ dark, lang, setView, goTo }) => (
  <>
    <Hero dark={dark} lang={lang} setView={setView} goTo={goTo}/>
    <LogoCarousel dark={dark}/>
    <About dark={dark} lang={lang}/>
    <Services dark={dark} lang={lang}/>
    <FeaturedWorks dark={dark} lang={lang} setView={setView}/>
    <Testimonials dark={dark} lang={lang}/>
    <Contact dark={dark} lang={lang}/>
    <Footer dark={dark} lang={lang}/>
  </>
);

/* ─────────────────────────────────────────
   APP ROOT
───────────────────────────────────────── */
const App = () => {
  const [dark, setDark] = useState(true);
  const [lang, setLang] = useState('en');
  const [view, setView] = useState('home');

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    document.body.style.backgroundColor = dark ? '#000000' : '#ffffff';
    document.body.style.color = dark ? '#ffffff' : '#000000';
    document.body.style.transition = 'background-color 0.3s ease, color 0.3s ease';
  }, [dark]);

  const goTo = id => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  };

  return (
    <div className={`min-h-screen transition-colors duration-300 ${dark ? 'bg-black text-white' : 'bg-white text-black'}`}>
      <Navbar dark={dark} setDark={setDark} lang={lang} setLang={setLang} view={view} setView={setView} goTo={goTo}/>
      {view === 'home'
        ? <Home dark={dark} lang={lang} setView={setView} goTo={goTo}/>
        : <AllProjects dark={dark} lang={lang} setView={setView}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
