  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; }

    @keyframes scrollLeft {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .scroll-track { animation: scrollLeft 28s linear infinite; }
    .scroll-track:hover { animation-play-state: paused; }

    .anim-fade-up   { animation: fadeInUp 0.9s ease both; }
    .anim-fade-up-1 { animation: fadeInUp 0.9s ease 0.15s both; }
    .anim-fade-up-2 { animation: fadeInUp 0.9s ease 0.30s both; }
    .anim-fade-up-3 { animation: fadeInUp 0.9s ease 0.45s both; }

    .spin-slow { animation: spinSlow 20s linear infinite; }
    .dot-blink { animation: blink 1.8s ease-in-out infinite; }

    .project-card .project-img  { transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94); }
    .project-card:hover .project-img { transform: scale(1.06); }
    .project-card .project-overlay { opacity: 0; transition: opacity 0.35s ease; }
    .project-card:hover .project-overlay { opacity: 1; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #8B5CF6; border-radius: 2px; }
  </style>

  const [view, setView] = useState('home');

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    document.body.style.backgroundColor = dark ? '#000000' : '#ffffff';
    document.body.style.color = dark ? '#ffffff' : '#000000';
    document.body.style.transition = 'background-color 0.3s ease, color 0.3s ease';
  }, [dark]);

  const goTo = id => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  };

  return (
    <div className={`min-h-screen transition-colors duration-300 ${dark ? 'bg-black text-white' : 'bg-white text-black'}`}>
      <Navbar dark={dark} setDark={setDark} view={view} setView={setView} goTo={goTo}/>
      {view === 'home'
        ? <Home dark={dark} setView={setView} goTo={goTo}/>
        : <AllProjects dark={dark} setView={setView}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
